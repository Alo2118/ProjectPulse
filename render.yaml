services:
  - type: web
    name: projectpulse-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run init-db && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://project-pulse-amber.vercel.app
    autoDeploy: true
