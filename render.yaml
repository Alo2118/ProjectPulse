services:
  - type: web
    name: projectpulse-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    # Persistent disk for SQLite database - prevents data loss on deploy
    disk:
      name: projectpulse-db
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://project-pulse-amber.vercel.app
    autoDeploy: true
